<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Dorelly ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
z-index:-1;
}

.phone{
width:360px;
height:720px;
background:#111;
border-radius:40px;
padding:12px;
box-shadow:0 0 40px rgba(255,255,255,.2);
}

.screen{
height:100%;
background:url("https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200") center/cover;
border-radius:30px;
overflow:hidden;
display:flex;
flex-direction:column;
}

.header{
background:#075E54;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.chat{
flex:1;
padding:15px;
overflow-y:auto;
}

.msg{
padding:10px 15px;
margin:10px 0;
border-radius:15px;
max-width:80%;
animation:fade .5s;
}

.yo{
background:#DCF8C6;
margin-left:auto;
color:black;
}

.ella{
background:white;
color:black;
}

.input{
padding:10px;
background:#202C33;
display:flex;
justify-content:center;
}

button{
padding:12px 20px;
border:none;
border-radius:25px;
background:#25D366;
color:white;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.final{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,.8);
color:white;
text-align:center;
padding:20px;
}

.final h1{
font-size:50px;
margin-bottom:20px;
}

.final p{
font-size:24px;
max-width:800px;
line-height:1.7;
}

</style>
</head>
<body>

<video autoplay muted loop playsinline>
<source src="b0d98ba93d1049b2021946719203bb3b.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="phone">

<div class="screen">

<div class="header">
❤️ Dorelly
</div>

<div class="chat" id="chat"></div>

<div class="input">
<button onclick="iniciarHistoria()">
Enviar ❤️
</button>
</div>

</div>

</div>

<div class="final" id="final">

<h1>❤️ Dorelly ❤️</h1>

<p>
No sé si esta página logre expresar todo lo que siento.

Pero quería que supieras que eres una persona muy especial para mí.

Cada conversación contigo hace mis días mejores.

Y si algo tengo claro...

es que me encanta haberte conocido. 🌹
</p>

</div>

<script>

let iniciado=false;

const mensajes=[

{tipo:"yo",texto:"Hola Dorelly ❤️"},
{tipo:"ella",texto:"Hola 😊"},
{tipo:"yo",texto:"Quería decirte algo..."},
{tipo:"ella",texto:"¿Qué pasa?"},
{tipo:"yo",texto:"Que me alegras los días más de lo que imaginas."},
{tipo:"ella",texto:"🥹"},
{tipo:"yo",texto:"Que cada vez que hablo contigo sonrío."},
{tipo:"yo",texto:"Y que eres una persona increíble."},
{tipo:"ella",texto:"❤️"},
{tipo:"yo",texto:"Por eso hice esta página para ti."},
{tipo:"yo",texto:"Porque quería que supieras lo especial que eres."}

];

function iniciarHistoria(){

if(iniciado) return;

iniciado=true;

let i=0;

const intervalo=setInterval(()=>{

const chat=document.getElementById("chat");

const div=document.createElement("div");

div.className="msg "+mensajes[i].tipo;

div.innerText=mensajes[i].texto;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

i++;

if(i>=mensajes.length){

clearInterval(intervalo);

setTimeout(()=>{

document.getElementById("final").style.display="flex";

},4000);

}

},1800);

}

</script>

</body>
</html>
