<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Dorelly ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

#videoFondo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
z-index:-2;
}

.phone{
width:360px;
height:720px;
background:#111;
border-radius:40px;
padding:10px;
box-shadow:0 0 30px rgba(255,255,255,.3);
}

.screen{
height:100%;
border-radius:30px;
overflow:hidden;
display:flex;
flex-direction:column;
background:#ece5dd;
}

.header{
background:#075E54;
color:white;
padding:15px;
font-size:20px;
font-weight:bold;
}

.chat{
flex:1;
padding:15px;
overflow-y:auto;
}

.msg{
padding:10px 15px;
border-radius:15px;
margin:10px 0;
max-width:80%;
animation:fade .5s;
}

.yo{
background:#DCF8C6;
margin-left:auto;
}

.ella{
background:white;
}

.input{
background:#202C33;
padding:15px;
display:flex;
justify-content:center;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:#25D366;
color:white;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.typing{
color:#666;
font-style:italic;
padding:10px;
}

.final{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:30px;
color:white;
}

.final h1{
font-size:50px;
margin-bottom:20px;
}

.final p{
font-size:24px;
max-width:900px;
line-height:1.8;
}

.heart{
position:fixed;
bottom:-50px;
font-size:30px;
animation:subir linear infinite;
pointer-events:none;
}

@keyframes subir{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<video id="videoFondo" loop playsinline>
<source src="b0d98ba93d1049b2021946719203bb3b.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="phone">

<div class="screen">

<div class="header">
❤️ Dorelly
</div>

<div class="chat" id="chat"></div>

<div class="input">
<button onclick="iniciarHistoria()">
Enviar ❤️
</button>
</div>

</div>

</div>

<div class="final" id="final">

<h1>❤️ Dorelly ❤️</h1>

<p>
No hice esta página para impresionarte.

La hice porque quería que supieras que eres alguien muy especial para mí.

Cada conversación contigo hace mis días mejores.

Y si algo tengo claro...

es que me encanta haberte conocido.

🌹❤️🌹
</p>

</div>

<script>

let iniciado=false;

const mensajes=[

["yo","Hola Dorelly ❤️"],
["ella","Hola 😊"],
["yo","Quería decirte algo."],
["ella","¿Qué pasó?"],
["yo","Que eres una persona increíble."],
["ella","🥹"],
["yo","Que me gusta hablar contigo."],
["yo","Que me haces sonreír."],
["ella","❤️"],
["yo","Por eso hice esta página."],
["yo","Porque quería que supieras lo especial que eres."],
["yo","Gracias por existir 🌹"]
];

function iniciarHistoria(){

if(iniciado) return;

iniciado=true;

const video=document.getElementById("videoFondo");

video.muted=false;
video.volume=1;

video.play().catch(()=>{});

let i=0;

const intervalo=setInterval(()=>{

const chat=document.getElementById("chat");

const typing=document.createElement("div");
typing.className="typing";
typing.id="typing";
typing.innerText="escribiendo...";
chat.appendChild(typing);

chat.scrollTop=chat.scrollHeight;

setTimeout(()=>{

const t=document.getElementById("typing");

if(t) t.remove();

const div=document.createElement("div");

div.className="msg "+mensajes[i][0];
div.innerText=mensajes[i][1];

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

},1000);

i++;

if(i>=mensajes.length){

clearInterval(intervalo);

setTimeout(()=>{

document.getElementById("final").style.display="flex";

},5000);

}

},2500);

}

function crearCorazon(){

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*4+4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(crearCorazon,400);

</script>

</body>
</html>
